# Назва робочого процесу (відображається у вкладці Actions)
name: Security Tests for Lab 3

# Події, які запускають цей workflow
on:
  # Запуск при push в гілку main
  push:
    branches: [ "main", "master" ]
  
  # Запуск при створенні Pull Request в гілку main
  pull_request:
    branches: [ "main", "master" ]
  
  # Можливість запуску вручну з інтерфейсу GitHub
  workflow_dispatch:

# Змінні середовища, доступні для всіх job
env:
  PYTHON_VERSION: '3.10'
  FLASK_APP: LR2_1.py
  FLASK_ENV: testing

# Jobs виконуються паралельно (якщо не вказано needs)
jobs:
  # Назва першого завдання
  security-tests:
    # Назва виконавця (віртуальної машини)
    runs-on: ubuntu-latest
    
    # Стратегія матриці (можна тестувати на різних версіях)
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
      fail-fast: false  # Не зупиняти всі тести при першій помилці
    
    # Назва для відображення
    name: Testing on Python ${{ matrix.python-version }}
    
    # Кроки виконання
    steps:
      # Крок 1: Завантаження коду з репозиторію
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Завантажує всю історію (потрібно для аналізу)
      
      # Крок 2: Налаштування Python
      - name: 🐍 Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5  # Оновлено до v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'  # Кешує залежності для швидшого виконання
      
      # Крок 3: Встановлення залежностей
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip list  # Показує встановлені пакети (для логу)
      
      # Крок 4: Статичний аналіз коду за допомогою Bandit
      - name: 🔍 Run Bandit static analysis
        run: |
          echo "Запуск Bandit для статичного аналізу безпеки..."
          bandit -r . -f html -o bandit_report.html || true
          echo "Bandit аналіз завершено"
      
      # Крок 5: Підготовка до запуску динамічних тестів
      - name: 🔧 Prepare for dynamic tests
        run: |
          echo "Перевірка наявності тестів..."
          ls -la tests/
          echo "Створення бази даних для тестів..."
          # Тут можна додати команди для створення тестової БД
      
      # Крок 6: Запуск Flask додатку у фоновому режимі
      - name: 🚀 Start Flask application
        run: |
          echo "Запуск Flask додатку на порту 5000..."
          python app.py &
          FLASK_PID=$!
          echo "Flask запущено з PID: $FLASK_PID"
          # Чекаємо поки додаток запуститься
          sleep 5
          # Перевіряємо чи додаток працює
          curl -I http://localhost:5000 || (echo "❌ Flask не запустився" && exit 1)
          echo "✅ Flask додаток працює"
      
      # Крок 7: Запуск динамічних тестів з Pytest
      - name: 🧪 Run Pytest security tests
        id: pytest
        run: |
          echo "Запуск тестів безпеки..."
          pytest tests/ -v \
            --html=pytest_report.html \
            --self-contained-html \
            --maxfail=1 \
            --tb=short
        continue-on-error: true  # Продовжуємо навіть якщо тести падають
      
      # Крок 8: Збереження звітів як артефактів - ВИПРАВЛЕНО v3 -> v4
      - name: 📊 Upload test reports
        uses: actions/upload-artifact@v4  # Змінено з v3 на v4
        with:
          name: test-reports-python-${{ matrix.python-version }}
          path: |
            bandit_report.html
            pytest_report.html
            *.log
          retention-days: 30  # Зберігати 30 днів
          overwrite: true  # Додано для запобігання злиттю артефактів
        if: always()  # Виконується завжди, навіть при помилках
      
      # Крок 9: Відправка повідомлення в Telegram (опціонально)
      - name: 📱 Send Telegram notification
        if: failure() && github.ref == 'refs/heads/main'
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT_ID }}
          token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          message: |
            ❌ Тести безпеки провалені!
            Репозиторій: ${{ github.repository }}
            Коміт: ${{ github.sha }}
            Автор: ${{ github.actor }}
            Посилання: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      
      # Крок 10: Відправка повідомлення на email (опціонально)
      - name: 📧 Send email notification
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{secrets.MAIL_USERNAME}}
          password: ${{secrets.MAIL_PASSWORD}}
          subject: "❌ Security Tests Failed: ${{ github.repository }}"
          to: your-email@example.com
          from: GitHub Actions
          body: |
            Тести безпеки провалені!
            
            Репозиторій: ${{ github.repository }}
            Коміт: ${{ github.sha }}
            Автор: ${{ github.actor }}
            
            Посилання на звіт: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      
      # Крок 11: Перевірка статусу тестів
      - name: ✅ Check test status
        run: |
          if [[ "${{ steps.pytest.outcome }}" == "failure" ]]; then
            echo "❌ Деякі тести безпеки провалені!"
            exit 1
          else
            echo "✅ Всі тести безпеки пройдено!"
          fi

  # Додаткове завдання: аналіз коду з SonarCloud
  sonar-analysis:
    needs: security-tests  # Залежить від попереднього job
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'  # Тільки для main гілки
    
    steps:
      - uses: actions/checkout@v4  # Оновлено з v3 до v4
        with:
          fetch-depth: 0
      
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
