name: Security Tests for Lab 3

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:

env:
  FLASK_APP: LR2_v1.py
  FLASK_ENV: testing

jobs:
  security-tests:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Fix PYTHONPATH (ВАЖЛИВО)
      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV

      # 5. Bandit
      - name: Run Bandit
        run: bandit -r . -f html -o bandit_report.html || true

      # 6. Init DB
      - name: Prepare database
        run: python -c "from LR2_v1 import init_db; init_db()" || true

      # 7. Start Flask
      - name: Start Flask
        run: |
          python LR2_v1.py &
          sleep 3

          echo "Waiting for Flask..."
          for i in {1..15}; do
            if curl -s http://localhost:5000 > /dev/null; then
              echo "Flask is ready!"
              break
            fi
            sleep 2
          done

      # 8. Run tests
      - name: Run Pytest
        run: |
          pytest tests/ -v \
            --tb=long \
            -rA \
            --junitxml=report.xml \
            --html=pytest_report.html \
            --self-contained-html

      # 9. Upload reports
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            bandit_report.html
            pytest_report.html
            report.xml

      # 10. Check result (PASS = захищено)
      - name: Check test status
        if: always()
        run: |
          if grep -q "<failure" report.xml; then
            echo "❌ Security tests FAILED"
            exit 1
          else
            echo "✅ PASS - система захищена"
          fi


